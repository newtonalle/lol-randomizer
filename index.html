    function randomChampion(selectedRole) {
        let availableChampions = [];

        if (selectedRole == "all") {
            champions.forEach(champion => { availableChampions.push(champion) });
        } else
            champions.forEach(champion => { if (champion.roles.includes(selectedRole)) availableChampions.push(champion) });

        let chosenChampion = availableChampions[Math.floor(Math.random() * availableChampions.length)];
        document.getElementById("chosenChampName").textContent = chosenChampion.name;
        document.getElementById("chosenChampTitle").textContent = chosenChampion.title;

        let championIcon = `https://wiki.leagueoflegends.com/en-us/images/${chosenChampion.name.replaceAll(' ', '_').replaceAll("'", "%27")}_OriginalSquare.png`;

        if (chosenChampion.name == "Nunu & Willump") {
            championIcon = `https://wiki.leagueoflegends.com/en-us/images/Nunu_OriginalSquare.png`;
        }

        document.getElementById("chosenChampionImg").src = championIcon;
    }
</script>
